name: Release

# Build and publish a signed (ad-hoc) Drift.dmg whenever a v* tag is pushed.
# The DMG bundles the Parakeet v3 model so first-run dictation needs no download,
# and is attached to a GitHub Release marked "latest" — which is exactly the URL
# the landing page's download button points at:
#   https://github.com/Vinayak-Nair/Drift/releases/latest/download/Drift.dmg
#
# Cut a release with:
#   git tag v0.2.0 && git push origin v0.2.0
# or run this workflow manually (Actions ▸ Release ▸ Run workflow) with a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Publish as a prerelease (not marked latest) — use for dry-runs'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MODEL_REPO: FluidInference/parakeet-tdt-0.6b-v3-coreml
      MODEL_DIR_NAME: parakeet-tdt-0.6b-v3
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag and version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"   # drop any prerelease suffix (v0.2.0-rc.1 -> 0.2.0) for a valid app version
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (marketing version $VERSION)"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set app version from tag
        run: |
          V="${{ steps.meta.outputs.version }}"
          BUILD="${{ github.run_number }}"
          sed -i '' -E "s/(MARKETING_VERSION: )\"[^\"]*\"/\1\"$V\"/" project.yml
          sed -i '' -E "s/(CFBundleShortVersionString: )\"[^\"]*\"/\1\"$V\"/" project.yml
          sed -i '' -E "s/(CFBundleVersion: )\"[^\"]*\"/\1\"$BUILD\"/" project.yml
          sed -i '' -E "s/(CURRENT_PROJECT_VERSION: )\"[^\"]*\"/\1\"$BUILD\"/" project.yml
          grep -E "MARKETING_VERSION|CFBundleShortVersionString|CFBundleVersion|CURRENT_PROJECT_VERSION" project.yml

      - name: Cache Parakeet v3 model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/fluidaudio
          key: ${{ env.MODEL_REPO }}-${{ env.MODEL_DIR_NAME }}-v1

      - name: Download Parakeet v3 model (CoreML)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/pip" install --upgrade pip huggingface_hub
          "$RUNNER_TEMP/venv/bin/python" .github/scripts/download_model.py
          rm -rf "$RUNNER_TEMP/fluidaudio/$MODEL_DIR_NAME/.cache"

      - name: Verify model present
        run: |
          MODEL="$RUNNER_TEMP/fluidaudio/$MODEL_DIR_NAME"
          for d in Encoder.mlmodelc Decoder.mlmodelc JointDecisionv3.mlmodelc Preprocessor.mlmodelc; do
            test -d "$MODEL/$d" || { echo "::error::Missing $d in $MODEL"; ls -la "$MODEL" || true; exit 1; }
          done
          du -sh "$MODEL"

      - name: Build ad-hoc-signed DMG with bundled model
        env:
          # MODEL_CACHE points at the directory containing the model folder, which
          # is what scripts/release.sh copies into the app bundle.
          MODEL_CACHE: ${{ runner.temp }}/fluidaudio
        run: ./scripts/release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          test -f build/Drift.dmg || { echo "::error::build/Drift.dmg not found"; exit 1; }
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — replacing the DMG asset."
            gh release upload "$TAG" build/Drift.dmg --clobber
          elif [ "$PRERELEASE" = "true" ]; then
            echo "Publishing $TAG as a prerelease (not marked latest)."
            gh release create "$TAG" build/Drift.dmg \
              --title "Drift $TAG" \
              --notes-file .github/release-body.md \
              --generate-notes \
              --prerelease \
              --latest=false
          else
            gh release create "$TAG" build/Drift.dmg \
              --title "Drift $TAG" \
              --notes-file .github/release-body.md \
              --generate-notes \
              --latest
          fi
